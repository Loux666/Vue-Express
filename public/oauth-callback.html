<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Callback</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            text-align: center;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .message {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            padding: 15px 20px;
            border-radius: 8px;
            margin-top: 20px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner"></div>
        <div class="message" id="message">Đang xử lý đăng nhập...</div>
        <div id="error-container"></div>
    </div>

    <script>
        (function () {
            const messageEl = document.getElementById('message');
            const errorContainer = document.getElementById('error-container');

            console.log('[OAuth Callback] Starting...');

            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const provider = urlParams.get('provider');
            const error = urlParams.get('error');

            console.log('[OAuth Callback] Params:', { hasToken: !!token, provider, error });

            if (!window.opener) {
                console.error('[OAuth Callback] No window.opener found!');
                messageEl.textContent = 'Lỗi: Không tìm thấy cửa sổ cha';
                showError('Vui lòng đóng cửa sổ này và thử lại');
                return;
            }

            try {
                if (token) {
                    // Success message based on contract
                    const message = {
                        type: 'oauth-success',
                        token: token,
                        provider: provider || 'google'
                    };

                    console.log('[OAuth Callback] Sending success message:', message);
                    window.opener.postMessage(message, '*');

                    messageEl.textContent = 'Đăng nhập thành công! Đang chuyển hướng...';
                    setTimeout(() => window.close(), 500);
                } else if (error) {
                    // Error message based on contract
                    const message = {
                        type: 'oauth-error',
                        error: error
                    };

                    console.log('[OAuth Callback] Sending error message:', message);
                    window.opener.postMessage(message, '*');

                    messageEl.textContent = 'Đăng nhập thất bại';
                    showError(error);
                    setTimeout(() => window.close(), 3000);
                } else {
                    // Fallback
                    console.warn('[OAuth Callback] Missing both token and error');
                    window.opener.postMessage({
                        type: 'oauth-error',
                        error: 'Dữ liệu trả về không hợp lệ'
                    }, '*');

                    messageEl.textContent = 'Lỗi dữ liệu';
                    showError('Không nhận được token từ server');
                    setTimeout(() => window.close(), 3000);
                }
            } catch (error) {
                console.error('[OAuth Callback] Error:', error);
                messageEl.textContent = 'Có lỗi xảy ra';
                showError(error.message || 'Lỗi không xác định');

                // Try to send error to parent
                try {
                    if (window.opener) {
                        window.opener.postMessage({
                            oauth: true,
                            success: false,
                            message: error.message || 'Lỗi callback'
                        }, '*');
                    }
                } catch (e) {
                    console.error('[OAuth Callback] Could not send error to parent:', e);
                }

                setTimeout(() => {
                    window.close();
                }, 3000);
            }

            function showError(message) {
                errorContainer.innerHTML = `<div class="error">${message}</div>`;
            }
        })();
    </script>
</body>

</html>
