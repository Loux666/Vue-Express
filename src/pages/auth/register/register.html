<div class="register-page">
	<div class="register-container">
		<div class="logo-section">
			<img src="/src/assets/logo/LOGO PAGE RYA.png" alt="Rya's Store" class="logo-image" />
			<h1>Đăng ký</h1>
			<p>Tạo tài khoản mới</p>
		</div>

		<form @submit.prevent="handleRegister">
			<div class="form-group">
				<label for="name">Họ và tên</label>
				<input id="name" v-model="name" placeholder="Nguyễn Văn A" required />
			</div>

			<div class="form-group">
				<label for="email">Email</label>
				<input id="email" type="email" v-model="email" placeholder="example@gmail.com" required />
			</div>

			<div class="form-group">
				<label for="password">Mật khẩu</label>
				<input id="password" type="password" v-model="password" placeholder="••••••••" required />
			</div>
			<div class="form-group">
				<label for="password-confirmation">Nhập lại mật khẩu</label>
				<input id="password-confirmation" type="password" v-model="password_confirmation"
					placeholder="Nhập lại password..." required />
			</div>

			<div v-if="errorMessage" class="error-msg" style="color: #ff4d4f; margin-bottom: 15px; font-size: 14px;">
				{{ errorMessage }}
			</div>

			<button type="submit" class="btn-register">Đăng ký</button>
		</form>
		<div class="auth-links">
			<span>Đã có tài khoản?</span>
			<router-link to="/login">Đăng nhập</router-link>
		</div>
	</div>
</div>
