<header class="header" :class="{ 'scrolled': isScrolled }">
    <div class="header-container">
      
      <div class="header-left">
        <a href="/" class="logo">
          <img src="/src/assets/logo/LOGO PAGE RYA.png" alt="Rya's Store" class="logo-image" />
          <span class="logo-text">Rya's Store</span>
        </a>
      </div>

      <nav class="header-center">
        <a href="#" class="nav-link">Trang chủ</a>
        <a href="#" class="nav-link">Bảng giá</a>
        <a href="#" class="nav-link">Về chúng tôi</a>
        <a href="#" class="nav-link">Liên hệ</a>
      </nav>
      
      <div class="header-right">
        <button class="icon-btn cart-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/>
            <circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="badge">3</span>
        </button>
        
        <template v-if="!isAuthenticated">
          <button class="btn btn-text" @click="goToLogin()">Đăng nhập</button>
          <button class="btn btn-primary" @click="goToRegister()">Đăng ký</button>
        </template>

        <template v-else>
          <div class="user-menu" @click.stop>
            <div class="user-info" @click="toggleDropdown">
              <img :src="avatarUrl" alt="avatar" class="user-avatar" />
              <span class="user-greeting">{{ userName }}</span>
              <svg class="chevron-down" :class="{ 'rotate': showDropdown }" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
              </svg>
            </div>

            <transition name="dropdown">
              <div class="user-dropdown" v-show="showDropdown">
                <router-link to="/profile" class="dropdown-item" @click.native="goToProfile">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                  </svg>
                  Thông tin cá nhân
                </router-link>
                <button class="dropdown-item logout" @click="logout">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                  </svg>
                  Đăng xuất
                </button>
              </div>
            </transition>
          </div>
        </template>
      </div>

    </div>
</header>

<!-- Category Bar -->
<div class="category-bar">
  <div class="category-container">
    
    <!-- Bán chạy - Ghim mặc định -->
    <div class="category-item featured">
      <span class="category-name">
        <span class="sale-badge">HOT</span>
        Bán chạy
      </span>
      <div class="category-dropdown">
        <div class="dropdown-content">
          <a href="#" class="sub-category">Top 10 tuần này</a>
          <a href="#" class="sub-category">Mới về hôm nay</a>
          <a href="#" class="sub-category">Flash sale</a>
          <a href="#" class="sub-category">Yêu thích nhất</a>
        </div>
      </div>
    </div>

    <!-- Collections -->
    <div v-for="collection in collections" :key="collection.id" class="category-item">
      <span class="category-name">{{ collection.name }}</span>
    </div>

    <!-- Audiences with Categories -->
    <div v-for="audience in audiences" :key="audience.id" class="category-item">
      <span class="category-name">{{ audience.label }}</span>
      <div class="category-dropdown">
        <div class="dropdown-content">
          <div v-for="category in audience.categories" :key="category.id" class="sub-group">
            <h4>{{ category.name }}</h4>
            <a v-for="child in category.children" :key="child.id" :href="`/category/${child.slug}`" class="sub-category">
              {{ child.name }}
            </a>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
