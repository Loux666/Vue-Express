<div class="header-wrapper">
  <!-- Topbar thông báo -->
  <div class="topbar">
    FREESHIP TOÀN QUỐC ĐƠN TỪ <b>499K</b> · ĐỔI TRẢ TRONG <b>7 NGÀY</b> · NEW DROP MỖI THỨ 6
  </div>

  <!-- Header chính -->
  <header class="header" :class="{ 'scrolled': isScrolled }">
    <div class="nav">

      <!-- Logo -->
      <div class="logo">
        <a href="/">
          <img src="/src/assets/logo/LOGO PAGE RYA.png" alt="Rya's Store" class="logo-image" />
          <span class="logo-text">Rya's Store</span>
        </a>
      </div>

      <!-- Nav links -->
      <nav class="nav-links">
        <a href="#" class="nav-link">Áo</a>
        <a href="#" class="nav-link">Quần</a>
        <a href="#" class="nav-link">Outerwear</a>
        <a href="#" class="nav-link">Phụ kiện</a>
        <a href="#" class="nav-link">Sale</a>
      </nav>

      <!-- Icons + Auth -->
      <div class="nav-icons">



        <!-- Cart -->
        <div class="icon-btn cart-btn" style="position:relative;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1" />
            <circle cx="20" cy="21" r="1" />
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
          </svg>
          <span class="cart-count">3</span>
        </div>

        <!-- Auth: chưa đăng nhập -->
        <template v-if="!isAuthenticated">
          <button class="btn btn-text" @click="goToLogin()">Đăng nhập</button>
          <button class="btn btn-primary" @click="goToRegister()">Đăng ký</button>
        </template>

        <!-- Auth: đã đăng nhập -->
        <template v-else>
          <div class="user-menu" @click.stop>
            <div class="user-info" @click="toggleDropdown">
              <img :src="avatarUrl" alt="avatar" class="user-avatar" />
              <span class="user-greeting">{{ userName }}</span>
              <svg class="chevron-down" :class="{ 'rotate': showDropdown }" width="16" height="16" viewBox="0 0 16 16"
                fill="currentColor">
                <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none" />
              </svg>
            </div>

            <transition name="dropdown">
              <div class="user-dropdown" v-show="showDropdown">
                <router-link to="/profile" class="dropdown-item" @click.native="goToProfile">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                  </svg>
                  Thông tin cá nhân
                </router-link>
                <button class="dropdown-item logout" @click="logout">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                  </svg>
                  Đăng xuất
                </button>
              </div>
            </transition>
          </div>
        </template>
      </div>
    </div>
  </header>
</div>
